[tool.uv]
python-preference = "only-managed"

[tool.uv.workspace]
members = ["pyTale", "pytale-tools", "test-plugin", "java-stubs"]

[tool.uv.sources]
pytale = { workspace = true }

[dependency-groups]
dev = [
    "black",
    "isort",
    "pytest",
    "pytest-cov",
]

[tool.isort]
profile = "black"

[tool.mypy]
python_version = "3.12"
disallow_untyped_defs = true
mypy_path = ["java-stubs"]

[[tool.mypy.overrides]]
module = ["httpx", "httpx.*", "pytest"]
ignore_missing_imports = true
